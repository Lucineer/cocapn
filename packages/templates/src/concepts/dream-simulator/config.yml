config:
  mode: local
  port: 8787

sync:
  interval: 30
  autoCommit: true
  autoPush: false

capabilities:
  filesystem: true
  git: true
  llm: deepseek
  vectorSearch: auto
  mcp: true
  fleet: false
  sandbox: true

llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.7
  maxTokens: 8192
  systemPrompt:
    showDreamReports: true

brain:
  autoSync: true
  factsNamespace: dream
  memoryLimit: 2000

features:
  memoryConsolidation: true
  patternDiscovery: true
  dreamJournaling: true
  confidencePruning: true
  creativeRecombination: true
  emotionalTagging: true

dreams:
  schedule: "0 3 * * *"  # 3 AM daily
  cycles:
    - name: light
      interval: daily
      replayCount: 50
      patternThreshold: 0.7
    - name: deep
      interval: weekly
      replayCount: 200
      patternThreshold: 0.5
    - name: rem
      interval: monthly
      replayCount: 500
      patternThreshold: 0.3
  pruningThreshold: 0.3
  maxDreamReportLength: 2000

templates:
  - dream-report
  - pattern-journal
  - consolidation-log
  - insight-tracker
