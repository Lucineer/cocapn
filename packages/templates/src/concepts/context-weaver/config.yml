config:
  mode: local
  port: 8787

sync:
  interval: 30
  autoCommit: true
  autoPush: false

capabilities:
  filesystem: true
  git: true
  llm: deepseek
  vectorSearch: auto
  mcp: true
  fleet: false
  sandbox: true

llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.7
  maxTokens: 8192
  systemPrompt:
    crossDomainMode: true

brain:
  autoSync: true
  factsNamespace: weave
  memoryLimit: 2000

features:
  crossDomainMapping: true
  analogyGeneration: true
  creativeBridging: true
  serendipityEngine: true
  transferLearning: true
  connectionTracking: true

weaving:
  maxConnectionDepth: 3
  serendipityFrequency: 0.2
  analogyThreshold: 0.6
  domainDetection: auto
  knowledgeGraphStore: wiki/cross-domain-map.md

templates:
  - cross-domain-analysis
  - analogy-map
  - serendipity-journal
  - transfer-insight
