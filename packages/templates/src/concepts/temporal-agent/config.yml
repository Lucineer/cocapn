config:
  mode: local
  port: 8787

sync:
  interval: 30
  autoCommit: true
  autoPush: false

capabilities:
  filesystem: true
  git: true
  llm: deepseek
  vectorSearch: auto
  mcp: true
  fleet: false
  sandbox: true

llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.4
  maxTokens: 8192
  systemPrompt:
    temporalContext: true
    showConfidence: true

brain:
  autoSync: true
  factsNamespace: temporal
  memoryLimit: 2000

features:
  timelineMaintenance: true
  whatIfSimulation: true
  confidenceDecay: true
  decisionRevisiting: true
  temporalPatterns: true
  futureProjection: true
  historicalContext: true
  conflictDetection: true

temporal:
  confidenceDecayRate: 0.05
  revisitThreshold: 0.4
  maxTimelineBranches: 10
  forecastHorizon: 90d
  seasonalDetection: true
  decayModel: exponential

templates:
  - timeline-view
  - what-if-scenario
  - decision-log
  - confidence-tracker
