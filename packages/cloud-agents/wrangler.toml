name            = "cocapn-agent"
main            = "src/worker.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# KV — soul.md, facts, wiki (read-only public cache synced from private repo via git push)
[[kv_namespaces]]
binding = "AUTH_KV"
id      = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"

# Durable Objects — Admiral handles cross-device session persistence
[[durable_objects.bindings]]
name       = "ADMIRAL"
class_name = "AdmiralDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AdmiralDO"]

[vars]
PRIVATE_REPO  = ""
PUBLIC_REPO   = ""
BRIDGE_MODE   = "cloud"
